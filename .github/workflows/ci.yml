name: CI

# Action versions pinned to specific minor releases. Update via dependabot or
# quarterly review.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version: 1.22.x
          cache: true
      - name: build
        run: make build
      - name: test
        run: make test

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version: 1.22.x
          cache: true
      - uses: golangci/golangci-lint-action@v6.1.1
        with:
          version: latest
