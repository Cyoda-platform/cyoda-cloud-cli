name: CI

# Action versions pinned to specific minor releases. Update via dependabot or
# quarterly review.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version: 1.26.3
          cache: true
      - name: build
        run: make build
      - name: test
        run: make test
      - name: govulncheck
        # Pinned to a specific tag rather than @latest so a new
        # govulncheck release (with new checks or behaviour changes)
        # cannot suddenly turn CI red without review. Bump alongside
        # other tooling pins on the quarterly review cadence.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-go@v5.2.0
        with:
          go-version: 1.26.3
          cache: true
      - uses: golangci/golangci-lint-action@v9.0.0
        with:
          # golangci-lint v2.x is built with Go 1.26+; required because go.mod
          # targets 1.26.3 (golangci-lint refuses to lint a module whose Go
          # directive is newer than the toolchain it was built with).
          # action@v9 mandates lint >= v2.1.0; pin both to specific minors.
          version: v2.12.2
